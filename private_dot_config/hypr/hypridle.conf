general {
    # Calls Noctalia's native lock screen via IPC
    lock_cmd = qs -c noctalia-shell ipc call lockScreen lock
    
    # Standard practice: tell the system to lock before sleeping
    before_sleep_cmd = loginctl lock-session 
}

# 1. Lock the screen after 10 minutes (600s)
# It's usually best to lock at the same time or before monitors turn off
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# 2. Turn off monitors after 10 minutes (600s)
listener {
    timeout = 600
    on-timeout = niri msg action power-off-monitors
    on-resume = niri msg action power-on-monitors
}

# 3. Suspend system after 1 hour (3600s)
listener {
    timeout = 3600
    on-timeout = systemctl suspend
}

